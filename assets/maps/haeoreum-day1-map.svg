<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="map-title map-desc">
  <title id="map-title">해오름역 1일차 조사 구역 안내도</title>
  <desc id="map-desc">지상, 지하 1층, 지하 2층의 조사 구역을 층별 건물 평면도로 표시한다. 방과 복도는 단색으로 구분하고 실제 이동 경로는 양방향 화살표로, 현재 위치는 붉은 점으로 표시한다.</desc>
  <defs>
    <marker id="arrow-start" markerWidth="4" markerHeight="4" refX="1" refY="2" orient="auto">
      <path d="M4 0L0 2L4 4Z" fill="#222"/>
    </marker>
    <marker id="arrow-end" markerWidth="4" markerHeight="4" refX="3" refY="2" orient="auto">
      <path d="M0 0L4 2L0 4Z" fill="#222"/>
    </marker>
    <style>
      .sheet{fill:#f6f6f2;stroke:#111;stroke-width:8}
      .header{fill:#111}
      .header-main{fill:#fff;font:400 27px 'Baekji Body','Ramche',sans-serif;letter-spacing:1px}
      .header-sub{fill:#222;font:400 13px 'Baekji Body','Ramche',sans-serif}
      .floor-panel{fill:#e4e4de;stroke:#111;stroke-width:3}
      .floor-tag{fill:#111}
      .floor-title{fill:#fff;font:400 21px 'Baekji Body','Ramche',sans-serif}
      .floor-sub{fill:#333;font:400 11px 'Baekji Body','Ramche',sans-serif}
      .plan-outline{fill:#d3d3cd;stroke:#111;stroke-width:5}
      .corridor{fill:#fff;stroke:#777;stroke-width:2}
      .room{fill:#f9f9f5;stroke:#111;stroke-width:3}
      .room.closed{fill:#c9c9c3;stroke:#777;stroke-width:2}
      .stair{fill:#ededE8;stroke:#111;stroke-width:3}
      .stair-step{stroke:#777;stroke-width:2}
      .door{fill:none;stroke:#111;stroke-width:2}
      .fixture{fill:none;stroke:#888;stroke-width:2}
      .route{fill:none;stroke:#222;stroke-width:3;stroke-linecap:round;marker-start:url(#arrow-start);marker-end:url(#arrow-end)}
      .route.floor-link{stroke-width:3;marker-start:none;marker-end:none}
      .route-plate{fill:#fff;stroke:#111;stroke-width:2}
      .route-label{fill:#111;font:400 10px 'Baekji Body','Ramche',sans-serif;text-anchor:middle}
      .node-name{fill:#111;font:400 19px 'Baekji Body','Ramche',sans-serif}
      .node-detail{fill:#333;font:400 11px 'Baekji Body','Ramche',sans-serif}
      .aux-name{fill:#444;font:400 10px 'Baekji Body','Ramche',sans-serif;text-anchor:middle}
      .legend{fill:#111;font:400 12px 'Baekji Body','Ramche',sans-serif}
      .legend-title{fill:#111;font:400 14px 'Baekji Body','Ramche',sans-serif}
      .current-location-marker{display:none;fill:#c90000;stroke:#fff;stroke-width:5;paint-order:stroke;filter:drop-shadow(2px 2px 0 #111)}
      [data-node].is-current .current-location-marker{display:block}
    </style>
  </defs>

  <rect class="sheet" x="8" y="8" width="1184" height="884"/>
  <rect class="header" x="22" y="22" width="1156" height="58"/>
  <text class="header-main" x="48" y="59">해오름역 조사 구역 안내도 · DAY 01</text>
  <text class="header-sub" x="38" y="103">방은 조사 구역 · 흰 띠는 복도 · 실선 화살표는 실제 왕복 이동 · 붉은 점은 현재 위치</text>

  <!-- 지상층: 구역 입구에서 환승광장으로 들어와 동·서 출입구로 갈라지는 T자 동선 -->
  <g id="ground-floor" data-floor="GROUND">
    <rect class="floor-panel" x="28" y="118" width="1144" height="214"/>
    <rect class="floor-tag" x="42" y="134" width="104" height="38"/>
    <text class="floor-title" x="69" y="161">지상</text>
    <text class="floor-sub" x="45" y="189">GROUND</text>

    <path class="plan-outline" d="M160 139H1140V311H160V290H142V217H160Z"/>
    <path class="corridor" d="M185 210H1118V292H185Z"/>
    <rect class="room closed" x="565" y="148" width="225" height="52"/>
    <text class="aux-name" x="678" y="178">비조사 시설</text>

    <g id="ground-routes" aria-label="지상 이동 동선">
      <path class="route" data-route="E_R001 E_R001_REV" data-from="E_ENTRY" data-to="E_G_PLAZA" d="M324 257H376"/>
      <path class="route" data-route="E_R003 E_R003_REV" data-from="E_G_PLAZA" data-to="E_G_WEST" d="M457 220V198"/>
      <path class="route" data-route="E_R002 E_R002_REV" data-from="E_G_PLAZA" data-to="E_G_EAST" d="M792 252H838"/>
    </g>

    <g class="node" data-node="E_ENTRY">
      <rect class="room" x="168" y="224" width="156" height="67"/>
      <path class="door" d="M324 246A21 21 0 0 1 303 225"/>
      <text class="node-name" x="186" y="253">구역 입구</text>
      <text class="node-detail" x="186" y="275">조사 시작 지점</text>
      <circle class="current-location-marker" cx="303" cy="272" r="10"/>
    </g>

    <g class="node" data-node="E_G_WEST">
      <rect class="room" x="355" y="147" width="204" height="58"/>
      <text class="node-name" x="372" y="173">서부 출입구</text>
      <text class="node-detail" x="372" y="193">출구 · B1 서부계단 연결</text>
      <circle class="current-location-marker" cx="537" cy="164" r="10"/>
    </g>

    <g class="node" data-node="E_G_PLAZA">
      <rect class="room" x="376" y="220" width="416" height="78"/>
      <path class="fixture" d="M408 239H470V257H408ZM506 238H610M506 249H610M710 236V282M724 236V282"/>
      <text class="node-name" x="410" y="279">환승광장</text>
      <text class="node-detail" x="548" y="279">안내대 · 벤치 · 동서 연결 홀</text>
      <circle class="current-location-marker" cx="769" cy="239" r="10"/>
    </g>

    <g class="node" data-node="E_G_EAST">
      <rect class="room" x="838" y="220" width="280" height="78"/>
      <path class="door" d="M1118 245A24 24 0 0 0 1094 221"/>
      <text class="node-name" x="858" y="251">동부 출입구</text>
      <text class="node-detail" x="858" y="276">방풍문 · B1 동부계단 연결</text>
      <circle class="current-location-marker" cx="1092" cy="276" r="10"/>
    </g>
  </g>

  <!-- B1: 중앙 대합실을 허브로 발매 구역, 개찰구, 쉘터가 갈라진다 -->
  <g id="b1-floor" data-floor="B1">
    <rect class="floor-panel" x="28" y="350" width="1144" height="264"/>
    <rect class="floor-tag" x="42" y="366" width="104" height="38"/>
    <text class="floor-title" x="77" y="393">B1</text>
    <text class="floor-sub" x="44" y="421">대합·발매·개찰</text>

    <rect class="plan-outline" x="160" y="370" width="980" height="224"/>
    <path class="corridor" d="M184 402H1118V574H184Z"/>

    <g aria-label="지상층 연결 계단">
      <rect class="stair" x="184" y="382" width="188" height="49"/>
      <path class="stair-step" d="M198 394H242M198 402H242M198 410H242M198 418H242"/>
      <text class="node-detail" x="252" y="402">지상 서부 출입구</text>
      <text class="node-detail" x="252" y="419">계단으로 연결 ↑</text>
      <path class="route floor-link" data-route="E_R030 E_R030_REV" data-from="E_G_WEST" data-to="E_B1_CONCOURSE" d="M348 408H363"/>

      <rect class="stair" x="930" y="382" width="188" height="49"/>
      <path class="stair-step" d="M943 394H987M943 402H987M943 410H987M943 418H987"/>
      <text class="node-detail" x="996" y="402">지상 동부 출입구</text>
      <text class="node-detail" x="996" y="419">계단으로 연결 ↑</text>
      <path class="route floor-link" data-route="E_R004 E_R004_REV" data-from="E_G_EAST" data-to="E_B1_CONCOURSE" d="M915 408H930"/>
    </g>

    <g id="b1-routes" aria-label="지하 1층 이동 동선">
      <path class="route" data-route="E_R005 E_R005_REV" data-from="E_B1_CONCOURSE" data-to="E_B1_TICKET" d="M430 497L360 526"/>
      <path class="route" data-route="E_R006 E_R006_REV" data-from="E_B1_CONCOURSE" data-to="E_B1_GATE" d="M580 500V520"/>
      <path class="route" data-route="E_R009 E_R009_REV" data-from="E_B1_CONCOURSE" data-to="E_B1_SHELTER" d="M755 497L835 526"/>
    </g>

    <g class="node" data-node="E_B1_CONCOURSE">
      <rect class="room" x="363" y="442" width="552" height="58"/>
      <path class="fixture" d="M392 457H463V478H392ZM705 454H861M705 465H861M705 476H816"/>
      <text class="node-name" x="487" y="469">중앙 대합실</text>
      <text class="node-detail" x="487" y="488">층내 이동 허브 · 안내소 · 공지 게시판</text>
      <circle class="current-location-marker" cx="891" cy="460" r="10"/>
    </g>

    <g class="node" data-node="E_B1_TICKET">
      <rect class="room" x="184" y="526" width="246" height="52"/>
      <path class="fixture" d="M201 538V565M218 538V565M235 538V565"/>
      <text class="node-name" x="254" y="550">발매 구역</text>
      <text class="node-detail" x="254" y="568">자동발매기 · 노선도</text>
      <circle class="current-location-marker" cx="408" cy="543" r="10"/>
    </g>

    <g class="node" data-node="E_B1_GATE">
      <rect class="room" x="462" y="520" width="236" height="58"/>
      <path class="fixture" d="M479 535V563M496 535V563M513 535V563"/>
      <text class="node-name" x="531" y="546">개찰구</text>
      <text class="node-detail" x="531" y="565">B2 환승 통로 연결</text>
      <circle class="current-location-marker" cx="676" cy="538" r="10"/>
    </g>

    <g class="node" data-node="E_B1_SHELTER">
      <rect class="room" x="786" y="526" width="332" height="52"/>
      <path class="fixture" d="M804 538H824V565H804ZM834 538H854V565H834"/>
      <text class="node-name" x="874" y="550">제4쉘터 입구</text>
      <text class="node-detail" x="874" y="568">B2 비상계단 연결 · 방폭문</text>
      <circle class="current-location-marker" cx="1096" cy="543" r="10"/>
    </g>
  </g>

  <!-- B2: 개찰구 아래 환승 통로에서 승강장으로, 쉘터에서는 별도 비상계단으로 연결 -->
  <g id="b2-floor" data-floor="B2">
    <rect class="floor-panel" x="28" y="632" width="1144" height="210"/>
    <rect class="floor-tag" x="42" y="648" width="104" height="38"/>
    <text class="floor-title" x="77" y="675">B2</text>
    <text class="floor-sub" x="45" y="703">환승·승강장</text>

    <rect class="plan-outline" x="160" y="650" width="980" height="174"/>
    <path class="corridor" d="M184 670H1118V806H184Z"/>

    <g aria-label="지하 1층 연결">
      <rect class="route-plate" x="414" y="660" width="300" height="27"/>
      <text class="route-label" x="564" y="678">B1 개찰구 · 계단/에스컬레이터 연결</text>
      <path class="route floor-link" data-route="E_R010 E_R010_REV" data-from="E_B1_GATE" data-to="E_B2_TRANSFER" d="M564 688V699"/>

      <rect class="route-plate" x="876" y="660" width="242" height="27"/>
      <text class="route-label" x="997" y="678">B1 제4쉘터 입구로 연결</text>
      <path class="route floor-link" data-route="E_R020 E_R020_REV" data-from="E_B1_SHELTER" data-to="E_B2_SHELTER_STAIR" d="M997 688V699"/>
    </g>

    <path class="route" data-route="E_R011 E_R011_REV" data-from="E_B2_TRANSFER" data-to="E_B2_P12" d="M564 752V765"/>

    <g class="node" data-node="E_B2_TRANSFER">
      <rect class="room" x="414" y="699" width="300" height="53"/>
      <path class="fixture" d="M435 714H489M435 725H489M631 713H690M631 725H690"/>
      <text class="node-name" x="505" y="724">환승 통로</text>
      <text class="node-detail" x="505" y="743">승강기 전실 · E/S</text>
      <circle class="current-location-marker" cx="692" cy="716" r="10"/>
    </g>

    <g class="node" data-node="E_B2_P12">
      <rect class="room" x="184" y="765" width="530" height="41"/>
      <path class="fixture" d="M201 777H697M228 790H670"/>
      <text class="node-name" x="215" y="794">1·2번 승강장</text>
      <text class="node-detail" x="386" y="794">대기 구역 · 스크린도어 · 설비함</text>
      <circle class="current-location-marker" cx="690" cy="785" r="10"/>
    </g>

    <g class="node" data-node="E_B2_SHELTER_STAIR">
      <rect class="room" x="876" y="699" width="242" height="107"/>
      <rect class="stair" x="892" y="716" width="73" height="69"/>
      <path class="stair-step" d="M902 728H955M902 739H955M902 750H955M902 761H955M902 772H955"/>
      <text class="node-name" x="978" y="736">쉘터</text>
      <text class="node-name" x="978" y="758">비상계단</text>
      <text class="node-detail" x="978" y="780">중간참 · 방화문</text>
      <circle class="current-location-marker" cx="1097" cy="716" r="10"/>
    </g>
  </g>

  <g id="legend" transform="translate(48 868)">
    <text class="legend-title" x="0" y="5">범례</text>
    <line class="route" x1="65" y1="0" x2="125" y2="0"/>
    <text class="legend" x="145" y="5">왕복 이동</text>
    <rect class="room" x="260" y="-14" width="44" height="27"/>
    <text class="legend" x="320" y="5">조사 구역</text>
    <rect class="corridor" x="430" y="-14" width="44" height="27"/>
    <text class="legend" x="490" y="5">복도</text>
    <rect class="stair" x="565" y="-14" width="44" height="27"/>
    <text class="legend" x="625" y="5">층간 연결</text>
    <circle cx="746" cy="0" r="10" fill="#c90000" stroke="#fff" stroke-width="4"/>
    <text class="legend" x="770" y="5">현재 위치</text>
    <text class="legend" x="930" y="5">문 위치 ◜</text>
  </g>
</svg>
